<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png">

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Google Font -->
    <link rel="" href="https://fonts.googleapis.com">
    <link rel="" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">

</head>



<body class="bg-gray-100 min-h-screen flex flex-col gap-6">

    <!-- Navbar -->

    <div class="bg-white shadow p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img class="w-7 h-7 flex justify-center items-center" src="assets/github-logo.png" alt="GitHub Logo">
            <h1 class="text-xl font-bold">
                GitHub Issues Tracker
            </h1>
        </div>

        <!-- search bar -->
        <div class="flex flex-col sm:flex-row gap-2 mb-4">
            <input id="searchInput" class="border p-2 rounded flex-1" placeholder="Search issues">
            <button onclick="searchIssue()" class="btn btn-primary text-white px-4 rounded">
                Search
            </button>
        </div>

    </div>



    <!-- Tabs -->

    <div class="flex gap-4 px-4">

        <button onclick="setActive(this); loadIssues('all')" class="tabBtn bg-blue-500 text-white px-4 py-2 rounded">
            All
        </button>

        <button onclick="setActive(this); loadIssues('open')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
            Open
        </button>

        <button onclick="setActive(this); loadIssues('closed')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
            Closed
        </button>

    </div>



    <!-- Stats Section -->

    <div class="mx-4 bg-white rounded-xl shadow p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">

        <!--Stats Left -->

        <div class="flex items-center gap-3">

            <div class="bg-purple-200 text-purple-500 w-7 h-7 p-1 rounded-full flex items-center justify-center">
                <img src="assets/Aperture.png" alt="">
            </div>

            <h2 class="text-lg font-semibold">
                <span id="totalIssues">0</span> Issues
            </h2>

        </div>


        <!--Stats Right -->

        <div class="flex gap-6 text-sm">

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <span>Open (<span id="openCount">0</span>)</span>
            </div>

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                <span>Closed (<span id="closedCount">0</span>)</span>
            </div>

        </div>

    </div>



    <!-- Spinner -->

    <div id="spinner" class="hidden flex justify-center mt-6">

        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>

    </div>



    <!-- Issues Container -->

    <div id="issuesContainer" class="px-4 grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    </div>


    <!-- Issue Modal -->
    <div id="issueModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

        <div class="bg-white w-[550px] max-w-[90%] rounded-xl shadow-lg p-6">

            <h2 id="modalTitle" class="text-xl font-semibold mb-2"></h2>

            <div class="text-sm text-gray-500 mb-4">
                <span id="modalStatus" class="px-2 py-1 text-xs rounded text-white"></span>
                • Opened by <span id="modalAuthor"></span>
                • <span id="modalDate"></span>
            </div>

            <div class="flex gap-2 mb-4">
                <span class="bg-red-100 text-red-700 text-xs px-3 py-1 rounded-full"><i class="fa-solid fa-bug"></i>
                    BUG</span>
                <span class="bg-orange-100 text-orange-600 text-xs px-3 py-1 rounded-full"><i
                        class="fa-solid fa-life-ring"></i> HELP WANTED</span>
            </div>

            <p id="modalDescription" class="text-gray-600 mb-6"></p>

            <div class="flex justify-between text-sm mb-6">

                <div>
                    <p class="text-gray-400">Assignee:</p>
                    <p id="modalAuthorName" class="font-medium"></p>
                </div>

                <div>
                    <p class="text-gray-400">Priority:</p>
                    <span id="modalPriority" class="text-xs px-3 py-1 rounded-full text-white"></span>
                </div>

            </div>

            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-purple-600 text-white px-4 py-2 rounded">
                    Close
                </button>
            </div>

        </div>

    </div>

    <script src="script.js" defer></script>

</body>

</html>
