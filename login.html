<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Tracker | Login</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- CSS Link -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Tailwind CSS and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="" href="https://fonts.googleapis.com">
    <link rel="" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen" style="font-family: 'Geist', sans-serif;">

    <div class="bg-white p-8 rounded-lg shadow-md w-80 text-center text-sm">
        <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 mx-auto mb-4">

        <h1 class="text-xl font-bold mb-2">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-6">Sign in to manage your issues</p>

        <input id="username" type="text" class="border w-full p-2 mb-3 rounded" placeholder="Username">

        <input id="password" type="password" class="border w-full p-2 mb-3 rounded" placeholder="Password">

        <button onclick="login()" class="btn btn-primary w-full">
            Sign In
        </button>

        <div class="text-xs mt-4 flex flex-col gap-1 items-center">
            <h2 class="font-bold text-xl ">OR</h2>
            <div class="text-gray-500 font-semibold">Demo Credentials:</div>
            <div class="text-gray-500 font-semibold">Username: admin</div>
            <div class="text-gray-500 font-semibold">Password: admin123</div>
        </div>
    </div>

    <script src="script.js" defer></script>

</body>

</html>
